<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>InkTrick — AI Tattoo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0c0b09;color:#f0e8d0;font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 14px 50px;}
    .logo{text-align:center;margin-bottom:20px;}
    .logo-text{font-size:clamp(1.8rem,6vw,2.4rem);letter-spacing:0.45em;color:#c8a84a;text-transform:uppercase;}
    .logo-line{height:1px;background:linear-gradient(90deg,transparent,#c8a84a,transparent);margin:7px auto;max-width:260px;}
    .logo-sub{font-style:italic;font-size:0.8rem;color:#6a5a3a;}
    .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px;}
    .card{background:#131108;border:1px solid #2a2518;border-radius:4px;padding:16px;}
    .lbl{font-size:0.54rem;letter-spacing:0.4em;color:#6a5a3a;text-transform:uppercase;margin-bottom:8px;}
    input{width:100%;background:#0d0c09;border:1px solid #2a2518;border-radius:2px;color:#f0e8d0;font-family:Georgia,serif;font-size:1rem;padding:11px 14px;outline:none;}
    .row{display:flex;gap:8px;}
    .show-btn{background:none;border:1px solid #2a2518;color:#6a5a3a;font-family:Georgia,serif;font-size:0.6rem;padding:0 12px;cursor:pointer;border-radius:2px;white-space:nowrap;}
    .styles-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .style-btn{background:rgba(255,255,255,0.03);border:1.5px solid #2a2518;color:#6a5a3a;font-family:Georgia,serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;padding:10px 12px;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:8px;text-align:left;transition:all 0.2s;}
    .style-btn.active{background:rgba(200,168,74,0.12);border-color:#c8a84a;color:#c8a84a;}
    .sicon{font-size:1.3rem;flex-shrink:0;}
    .sdesc{font-size:0.5rem;opacity:0.55;margin-top:2px;}
    .gen-btn{width:100%;background:linear-gradient(135deg,#a8841a,#c8a84a);border:1px solid #c8a84a;border-radius:3px;color:#0c0b09;font-family:Georgia,serif;font-size:0.85rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:15px;cursor:pointer;transition:all 0.3s;}
    .gen-btn:disabled{background:rgba(200,168,74,0.08);color:#c8a84a;cursor:not-allowed;}
    .err{color:#e07060;font-size:0.78rem;padding:10px 14px;background:rgba(176,48,24,0.08);border:1px solid rgba(176,48,24,0.2);border-radius:3px;display:none;}
    .loading{text-align:center;padding:20px 0;display:none;}
    .dots{display:flex;justify-content:center;gap:8px;margin-bottom:12px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#c8a84a;animation:pulse 1.4s ease-in-out infinite;}
    .dot:nth-child(2){animation-delay:0.35s;}.dot:nth-child(3){animation-delay:0.7s;}
    @keyframes pulse{0%,100%{transform:scale(0.7);opacity:0.3;}50%{transform:scale(1.3);opacity:1;}}
    .lmsg{font-size:0.72rem;color:#6a5a3a;font-style:italic;}
    .lsub{font-size:0.58rem;color:#6a5a3a;opacity:0.5;margin-top:6px;}
    .result{border:1px solid #2a2518;border-radius:4px;overflow:hidden;display:none;}
    .rh{padding:9px 16px;background:#131108;border-bottom:1px solid #2a2518;display:flex;justify-content:space-between;align-items:center;}
    .rn{font-size:0.75rem;letter-spacing:0.2em;color:#c8a84a;}
    .rt{font-size:0.54rem;color:#6a5a3a;font-style:italic;}
    #resultImg{width:100%;display:block;}
    .rnote{padding:10px 14px;background:rgba(200,168,74,0.04);border-top:1px solid #2a2518;font-size:0.68rem;color:#6a5a3a;font-style:italic;line-height:1.6;}
    .ra{padding:11px 14px;background:#131108;border-top:1px solid #2a2518;display:flex;gap:8px;}
    .bopen{flex:2;background:rgba(200,168,74,0.1);border:1px solid rgba(200,168,74,0.4);color:#c8a84a;font-family:Georgia,serif;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;padding:10px;border-radius:3px;cursor:pointer;text-decoration:none;text-align:center;display:block;}
    .bretry{flex:1;background:none;border:1px solid #2a2518;color:#6a5a3a;font-family:Georgia,serif;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;padding:10px;cursor:pointer;border-radius:3px;}
    .footer{margin-top:20px;text-align:center;font-style:italic;font-size:0.68rem;color:#3a3020;}
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-text">InkTrick</div>
    <div class="logo-line"></div>
    <div class="logo-sub">AI Tattoo · Name Hidden in Art</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="lbl">OpenAI API Key</div>
      <div class="row">
        <input type="password" id="apiKey" placeholder="sk-..."/>
        <button class="show-btn" onclick="toggleKey()">Show</button>
      </div>
      <div style="font-size:0.54rem;color:#6a5a3a;font-style:italic;margin-top:6px;opacity:0.6;">Key sent directly to OpenAI · never stored</div>
    </div>

    <div class="card">
      <div class="lbl">Name to hide</div>
      <input type="text" id="nameInput" placeholder="e.g. Priya or Nilesh" maxlength="12"
        onkeydown="if(event.key==='Enter')generate()"/>
    </div>

    <div class="card">
      <div class="lbl">Tattoo style</div>
      <div class="styles-grid" id="styleGrid"></div>
    </div>

    <div class="err" id="errBox"></div>

    <button class="gen-btn" id="genBtn" onclick="generate()">✦ Generate Tattoo</button>

    <div class="loading" id="loadBox">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="lmsg" id="lmsg">Generating your tattoo…</div>
      <div class="lsub">DALL·E 3 · 10–20 seconds</div>
    </div>

    <div class="result" id="resultBox">
      <div class="rh"><span class="rn" id="rn"></span><span class="rt">DALL·E 3</span></div>
      <img id="resultImg" src="" alt="AI tattoo"/>
      <div class="rnote" id="rnote"></div>
      <div class="ra">
        <a class="bopen" id="openBtn" href="#" target="_blank">↗ Open Full Size</a>
        <button class="bretry" onclick="reset()">↺ Retry</button>
      </div>
    </div>

    <div style="font-size:0.54rem;color:#6a5a3a;font-style:italic;text-align:center;opacity:0.4;margin-top:4px;">
      Powered by DALL·E 3 · Secure proxy · No CORS issues
    </div>
  </div>

  <div class="footer">inktrick.com · hidden in ink</div>

  <script>
    const WORKER = 'https://wild-fog-b15e.nilesh53333.workers.dev';

    const STYLES = [
      { id:'rose',    label:'Rose',    icon:'🌹', desc:'Name in thorns & petals',
        prompt: n=>`Minimalist fine line tattoo flash art on white background. Single rose with thorns and leaves. The name "${n}" is camouflaged within the design — each letter formed by thorn shapes, petal curves, and stem lines, not written as separate text. Black ink only, no color, no shading, professional tattoo artist style.`},
      { id:'lotus',   label:'Lotus',   icon:'🪷', desc:'Name in lotus petals',
        prompt: n=>`Minimalist fine line tattoo flash art on white background. Sacred lotus flower with mandala geometry. The name "${n}" is camouflaged within — letters formed by petal lines and geometric patterns, not written as text. Black ink only, no color, no shading, professional tattoo artist style.`},
      { id:'serpent', label:'Serpent', icon:'🐍', desc:'Name in snake scales',
        prompt: n=>`Minimalist fine line tattoo flash art on white background. Elegant coiled serpent with detailed scales. The name "${n}" is camouflaged within — letters formed by scale patterns, not written as text. Black ink only, no color, no shading, professional tattoo artist style.`},
      { id:'wolf',    label:'Wolf',    icon:'🐺', desc:'Name in wolf geometry',
        prompt: n=>`Minimalist fine line geometric tattoo flash art on white background. Low-poly wolf portrait. The name "${n}" is camouflaged within — letters formed by geometric facets and fur strokes, not written as text. Black ink only, no color, no shading, professional tattoo artist style.`},
      { id:'moon',    label:'Moon',    icon:'🌙', desc:'Name in celestial art',
        prompt: n=>`Minimalist fine line tattoo flash art on white background. Crescent moon with ornamental patterns and stars. The name "${n}" is camouflaged within — letters formed by moon decorations and star patterns, not written as text. Black ink only, no color, no shading, professional tattoo artist style.`},
      { id:'mandala', label:'Mandala', icon:'🔮', desc:'Name in mandala rings',
        prompt: n=>`Minimalist fine line tattoo flash art on white background. Ornate circular mandala. The name "${n}" is camouflaged within — letters formed by geometric ornamental patterns, not written as text. Black ink only, no color, no shading, professional tattoo artist style.`},
    ];

    let si = 0;
    const grid = document.getElementById('styleGrid');
    STYLES.forEach((s,i)=>{
      const btn=document.createElement('button');
      btn.className='style-btn'+(i===0?' active':'');
      btn.innerHTML=`<span class="sicon">${s.icon}</span><div><div>${s.label}</div><div class="sdesc">${s.desc}</div></div>`;
      btn.onclick=()=>{si=i;document.querySelectorAll('.style-btn').forEach((b,j)=>b.className='style-btn'+(j===i?' active':''));};
      grid.appendChild(btn);
    });

    function toggleKey(){
      const inp=document.getElementById('apiKey');
      const btn=document.querySelector('.show-btn');
      if(inp.type==='password'){inp.type='text';btn.textContent='Hide';}
      else{inp.type='password';btn.textContent='Show';}
    }

    const MSGS=['Sketching the design…','Hiding your name in the art…','Adding fine details…','Almost ready…'];

    async function generate(){
      const name=document.getElementById('nameInput').value.trim();
      const key=document.getElementById('apiKey').value.trim();
      if(!name){showErr('Please enter a name.');return;}
      if(!key){showErr('Please enter your OpenAI API key.');return;}
      hideErr();
      setLoad(true);
      document.getElementById('resultBox').style.display='none';
      let mi=0;
      document.getElementById('lmsg').textContent=MSGS[0];
      const iv=setInterval(()=>{mi=(mi+1)%MSGS.length;document.getElementById('lmsg').textContent=MSGS[mi];},5000);
      try{
        const res=await fetch(WORKER,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({type:'openai_image',apiKey:key,prompt:STYLES[si].prompt(name)})
        });
        clearInterval(iv);
        const data=await res.json();
        if(data.error)throw new Error(data.error.message||data.error);
        const url=data.data?.[0]?.url;
        if(!url)throw new Error('No image returned. Please retry.');
        document.getElementById('rn').textContent=`${name.toUpperCase()} · ${STYLES[si].icon} ${STYLES[si].label}`;
        document.getElementById('resultImg').src=url;
        document.getElementById('rnote').textContent=`✦ The name "${name.toUpperCase()}" is camouflaged in the ${STYLES[si].label.toLowerCase()} design. Look closely at the lines.`;
        document.getElementById('openBtn').href=url;
        document.getElementById('resultBox').style.display='block';
      }catch(e){
        clearInterval(iv);
        showErr(e.message||'Generation failed. Please try again.');
      }finally{setLoad(false);}
    }

    function reset(){document.getElementById('resultBox').style.display='none';}
    function setLoad(on){
      document.getElementById('loadBox').style.display=on?'block':'none';
      document.getElementById('genBtn').disabled=on;
      document.getElementById('genBtn').textContent=on?'✦ Generating…':'✦ Generate Tattoo';
    }
    function showErr(m){const b=document.getElementById('errBox');b.textContent=m;b.style.display='block';}
    function hideErr(){document.getElementById('errBox').style.display='none';}
  </script>
</body>
</html>

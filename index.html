    function floralPetals(word,cx,cy,pl,pw){
      return word.split("").map((letter,i)=>{
        const n=word.length,a=(i/n)*2*Math.PI-Math.PI/2,s=Math.PI/2;
        const tx=cx+Math.cos(a)*pl,ty=cy+Math.sin(a)*pl;
        const c1x=cx+Math.cos(a)*pl*0.5+Math.cos(a+s)*pw,c1y=cy+Math.sin(a)*pl*0.5+Math.sin(a+s)*pw;
        const c2x=cx+Math.cos(a)*pl*0.5-Math.cos(a+s)*pw,c2y=cy+Math.sin(a)*pl*0.5-Math.sin(a+s)*pw;
        return {letter,d:`M ${cx} ${cy} C ${c1x} ${c1y} ${tx} ${ty} ${tx} ${ty} C ${tx} ${ty} ${c2x} ${c2y} ${cx} ${cy} Z`,
          lx:cx+Math.cos(a)*pl*0.62,ly:cy+Math.sin(a)*pl*0.62};
      });
    }
    function floralLeaves(cx,cy,n,r){

        const a=(i/n)*2*Math.PI+Math.PI/n;
        const tx=cx+Math.cos(a)*r,ty=cy+Math.sin(a)*r;
        const c1x=cx+Math.cos(a-0.5)*r*0.6,c1y=cy+Math.sin(a-0.5)*r*0.6;
        const c2x=cx+Math.cos(a+0.5)*r*0.6,c2y=cy+Math.sin(a+0.5)*r*0.6;
        return `M ${cx} ${cy} Q ${c1x} ${c1y} ${tx} ${ty} Q ${c2x} ${c2y} ${cx} ${cy} Z`;
      });

      {main:"#ffd040",glow:"rgba(255,200,30,0.4)",text:"#fff5b0",ray:"#ffb020"},
      {main:"#ff60c0",glow:"rgba(255,80,180,0.4)",text:"#ffd0f0",ray:"#e02090"},
      {main:"#40d8ff",glow:"rgba(40,200,255,0.4)",text:"#c0f4ff",ray:"#10a8e0"},
      {main:"#60ff80",glow:"rgba(60,255,100,0.4)",text:"#c0ffd0",ray:"#10c040"},
    ];
    const FW_WORD_Y=[90,185,278,370];
    const FW_STARS=Array.from({length:130},(_,i)=>{
      const a=(i*2654435761)>>>0,b=(i*1234567891)>>>0;
      return{x:(a%380)+10,y:(b%380)+10,r:0.4+(i%6)*0.15};
    });
    function fwSparks(cx,cy,count,minR,maxR){
      return Array.from({length:count},(_,i)=>{
        const a=(i/count)*Math.PI*2,r=minR+(i%5)*(maxR-minR)/5;
        return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};
      });
    }

    // ── STYLES ────────────────────────────────────────────────
    const STYLES=[
      {id:"circles",label:"Circles",icon:"◎",geom:(n)=>n<=5?GEOM_SINGLE:GEOM_CIRCLES,base:circleBase,vb:(n)=>n<=5?"0 0 400 420":"0 0 400 480"},
      {id:"triangle",label:"Triangle",icon:"△",geom:()=>GEOM_TRIANGLE,base:(ink)=><>
        <polygon points="200,50 52,360 348,360" fill="none" stroke={ink} strokeWidth="1.5"/>
        <line x1="200" y1="50" x2="200" y2="360" stroke={ink} strokeWidth="0.6" opacity="0.2"/>
        <line x1="52" y1="360" x2="274" y2="205" stroke={ink} strokeWidth="0.6" opacity="0.2"/>
        <line x1="348" y1="360" x2="126" y2="205" stroke={ink} strokeWidth="0.6" opacity="0.2"/>
        <circle cx="200" cy="257" r="70" fill="none" stroke={ink} strokeWidth="0.6" opacity="0.25"/>
        <circle cx="200" cy="257" r="2.5" fill={ink} opacity="0.28"/>
        <line x1="200" y1="40" x2="200" y2="378" stroke={ink} strokeWidth="0.9" opacity="0.38" strokeLinecap="round"/>
        <polygon points="200,32 196.5,45 200,41 203.5,45" fill={ink} opacity="0.38"/>
        <polygon points="200,385 196.5,372 200,376 203.5,372" fill={ink} opacity="0.38"/>
      </>,vb:()=>"0 0 400 420"},
      {id:"diamond",label:"Diamond",icon:"◇",geom:()=>GEOM_DIAMOND,base:(ink)=><>
        <polygon points="200,40 360,220 200,400 40,220" fill="none" stroke={ink} strokeWidth="1.5"/>
        <line x1="40" y1="220" x2="360" y2="220" stroke={ink} strokeWidth="1" opacity="0.45"/>
        <line x1="200" y1="40" x2="200" y2="400" stroke={ink} strokeWidth="1" opacity="0.45"/>
        <polygon points="200,108 292,220 200,332 108,220" fill="none" stroke={ink} strokeWidth="0.7" opacity="0.3"/>
        <circle cx="200" cy="220" r="22" fill="none" stroke={ink} strokeWidth="0.6" opacity="0.3"/>
        <circle cx="200" cy="220" r="3" fill={ink} opacity="0.28"/>
        <polygon points="200,32 196.5,46 200,42 203.5,46" fill={ink} opacity="0.45"/>
        <polygon points="200,406 196.5,392 200,396 203.5,392" fill={ink} opacity="0.45"/>
        <polygon points="368,220 354,216.5 358,220 354,223.5" fill={ink} opacity="0.45"/>
        <polygon points="32,220 46,216.5 42,220 46,223.5" fill={ink} opacity="0.45"/>
      </>,vb:()=>"0 0 400 440"},
      {id:"stars",label:"Stars",icon:"★",geom:null,base:null,vb:null},
      {id:"floral",label:"Floral",icon:"✿",geom:null,base:null,vb:null},
      {id:"fireworks",label:"Sparks",icon:"🎆",geom:null,base:null,vb:null},
    ];

    // ── MAIN APP ──────────────────────────────────────────────
    function InkTrickStudio() {
      const [inputName,setInputName]=useState("");
      const [name,setName]=useState("");
      const [styleIdx,setStyleIdx]=useState(0);
      const [active,setActive]=useState({});
      const [error,setError]=useState("");
      const [cStep,setCStep]=useState(-1);
      const [cAnim,setCAnim]=useState(false);
      const [fStep,setFStep]=useState(-1);
      const [fAnim,setFAnim]=useState(false);
      const [fwWordIdx,setFwWordIdx]=useState(-1);
      const [fwLetIdx,setFwLetIdx]=useState(-1);
      const [fwShown,setFwShown]=useState([]);
      const [fwAnim,setFwAnim]=useState(false);
      const cTimer=useRef(null);
      const fTimer=useRef(null);
      const fwTimer=useRef(null);

      const style=STYLES[styleIdx];
      const isGeo=styleIdx<=2;
      const isStar=styleIdx===3;
      const isFlor=styleIdx===4;
      const isFw=styleIdx===5;
      const geom=isGeo?style.geom(name.length):null;
      const toggle=i=>setActive(a=>({...a,[i]:!a[i]}));
      const revealAll=()=>setActive(Object.fromEntries(name.split("").map((_,i)=>[i,true])));
      const hideAll=()=>setActive({});

      const cLetters=(isStar&&name)?buildConstellation(name):[];
      const cDone=cLetters.length>0&&cStep>=cLetters.length-1;
      const startCon=()=>{
        if(cAnim)return;
        if(cDone){setCStep(-1);return;}
        setCAnim(true);setCStep(-1);let i=0;
        const tick=()=>{setCStep(i);i++;if(i<cLetters.length)cTimer.current=setTimeout(tick,820);else setCAnim(false);};
        cTimer.current=setTimeout(tick,400);
      };

      const fWords=(isFlor&&name)?name.split(" ").filter(w=>w.length>0):[];
      const fLayout=FLORAL_LAYOUTS[Math.min(Math.max(fWords.length-1,0),2)];
      const fPetals=fWords.flatMap((w,wi)=>{
        const pos=fLayout[wi]||fLayout[0];
        return floralPetals(w,pos.cx,pos.cy,pos.pl,pos.pw).map(p=>({...p,wi}));
      });
      const fTotal=fPetals.length;
      const fDone=fTotal>0&&fStep>=fTotal-1;
      const startFlo=()=>{
        if(fAnim)return;
        if(fDone){setFStep(-1);return;}
        setFAnim(true);setFStep(-1);let i=0;
        const tick=()=>{setFStep(i);i++;if(i<fTotal)fTimer.current=setTimeout(tick,520);else setFAnim(false);};
        fTimer.current=setTimeout(tick,300);
      };

      const fwWords=(isFw&&name)?name.split(" ").filter(w=>w.length>0):[];
      const fwTotal=fwWords.length;
      const fwDone=fwShown.length>=fwTotal&&fwTotal>0;
      const startFw=()=>{
        if(fwAnim)return;
        if(fwDone){setFwWordIdx(-1);setFwLetIdx(-1);setFwShown([]);return;}
        setFwAnim(true);
        let wi=fwShown.length;
        const launchWord=(wordI)=>{
          setFwWordIdx(wordI);setFwLetIdx(-1);
          const word=fwWords[wordI];let li=0;
          const showLetter=()=>{
            setFwLetIdx(li);li++;
            if(li<word.length)fwTimer.current=setTimeout(showLetter,220);
            else fwTimer.current=setTimeout(()=>{
              setFwShown(prev=>[...prev,wordI]);
              setFwWordIdx(-1);setFwLetIdx(-1);
              const next=wordI+1;
              if(next<fwTotal)fwTimer.current=setTimeout(()=>launchWord(next),600);
              else setFwAnim(false);
            },1500);
          };
          fwTimer.current=setTimeout(showLetter,500);
        };
        launchWord(wi);
      };

      const generate=()=>{
        const raw=inputName.trim();
        const n=(isStar||isFlor||isFw)?raw.toUpperCase().replace(/[^A-Z ]/g,"").replace(/  +/g," "):raw.toUpperCase().replace(/[^A-Z]/g,"");
        if(!n||n.replace(/ /g,"").length<2){setError("Please enter a name.");return;}
        if(isStar&&n.length>32){setError("Max 32 characters.");return;}
        if(isFlor){
          const ws=n.split(" ").filter(w=>w.length>0);
          if(ws.length>3){setError("Max 3 words for floral.");return;}
          const lg=ws.find(w=>w.length>8);
          if(lg){setError(`"${lg}" too long — max 8 letters per word.`);return;}
        }
        if(isFw){
          const ws=n.split(" ").filter(w=>w.length>0);
          if(ws.length>4){setError("Max 4 words for fireworks.");return;}
          const lg=ws.find(w=>w.length>10);
          if(lg){setError(`"${lg}" too long — max 10 letters.`);return;}
        }
        if(!isStar&&!isFlor&&!isFw&&n.length>10){setError("Max 10 letters.");return;}
        if(isGeo){
          const g=style.geom(n.length);
          const miss=n.split("").filter(l=>!g[l]);
          if(miss.length){setError(`Letters not in this style: ${miss.join(", ")}`);return;}
        }
        setError("");setName(n);setActive({});setCStep(-1);setFStep(-1);
        setFwWordIdx(-1);setFwLetIdx(-1);setFwShown([]);
        clearTimeout(cTimer.current);clearTimeout(fTimer.current);clearTimeout(fwTimer.current);
        setCAnim(false);setFAnim(false);setFwAnim(false);
      };

      const changeStyle=i=>{
        setStyleIdx(i);setName("");setActive({});setError("");
        setCStep(-1);setFStep(-1);setFwWordIdx(-1);setFwLetIdx(-1);setFwShown([]);
        clearTimeout(cTimer.current);clearTimeout(fTimer.current);clearTimeout(fwTimer.current);
        setCAnim(false);setFAnim(false);setFwAnim(false);
      };

      const ink="#111009",bg="#f3efe8",gold="#c8a84a",dark="#0c0b09";
      const card="#131108",bdr="#2a2518",cream="#f0e8d0",muted="#6a5a3a",red="#b03018";
      const tr="stroke 0.3s,fill 0.3s";

      return (
        <div style={{background:dark,minHeight:"100vh",fontFamily:"Georgia,serif",color:cream,display:"flex",flexDirection:"column",alignItems:"center",padding:"22px 14px 50px"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:"clamp(1.8rem,6vw,2.4rem)",letterSpacing:"0.45em",color:gold,textTransform:"uppercase"}}>InkTrick</div>
            <div style={{height:1,background:`linear-gradient(90deg,transparent,${gold},transparent)`,margin:"7px auto",maxWidth:260}}/>
            <div style={{fontStyle:"italic",fontSize:"0.8rem",color:muted}}>Your name, hidden in art</div>
          </div>

          <div style={{display:"flex",gap:6,marginBottom:14,width:"100%",maxWidth:440}}>
            {STYLES.map((s,i)=>(
              <button key={s.id} onClick={()=>changeStyle(i)} style={{flex:1,background:styleIdx===i?"rgba(200,168,74,0.12)":"rgba(255,255,255,0.03)",border:`1.5px solid ${styleIdx===i?gold:bdr}`,color:styleIdx===i?gold:muted,fontFamily:"Georgia,serif",fontSize:"0.58rem",letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 2px",cursor:"pointer",borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.2s"}}>
                <span style={{fontSize:"1.1rem"}}>{s.icon}</span>
                {s.label}
              </button>
            ))}
          </div>

          <div style={{background:card,border:`1px solid ${bdr}`,borderRadius:4,padding:"18px 16px",width:"100%",maxWidth:440,marginBottom:12}}>
            <div style={{fontSize:"0.56rem",letterSpacing:"0.4em",color:muted,textTransform:"uppercase",marginBottom:8}}>
              Enter {isFlor?"message (max 3 words)":isStar?"message":isFw?"message (max 4 words)":"name"}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={inputName} onChange={e=>setInputName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&generate()}
                placeholder={isFlor||isStar||isFw?"e.g. Happy Birthday Piyu":"e.g. Priya"}
                maxLength={isStar?32:isFlor?28:isFw?36:10}
                style={{background:"#0d0c09",border:`1px solid ${bdr}`,borderRadius:2,color:cream,fontFamily:"Georgia,serif",fontSize:"1.1rem",letterSpacing:"0.15em",padding:"11px 12px",outline:"none",flex:1}}/>
              <button onClick={generate} style={{background:`linear-gradient(135deg,#a8841a,${gold})`,border:"none",borderRadius:3,color:dark,fontFamily:"Georgia,serif",fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",padding:"11px 14px",cursor:"pointer",whiteSpace:"nowrap"}}>Generate ✦</button>
            </div>
            {error&&<div style={{color:"#e07060",fontSize:"0.75rem",marginTop:7}}>{error}</div>}
            <div style={{fontSize:"0.58rem",color:muted,fontStyle:"italic",marginTop:6,opacity:0.7}}>
              {isFlor?"Max 3 words · 8 letters each · one flower per word":isStar?"Spaces allowed · each word = one row · max 32 chars":isFw?"Max 4 words · one firework per word · max 10 letters each":"A–Z · max 10 letters · circles: ≤5 = 1 circle"}
            </div>
          </div>

          {name&&(
            <div style={{border:`1px solid ${isStar?"#0d1f38":isFlor?"#2a1f0e":bdr}`,borderRadius:4,overflow:"hidden",width:"100%",maxWidth:440,background:isStar?"#040e20":isFlor?"#100c04":card}}>
              <div style={{padding:"9px 16px",borderBottom:`1px solid ${isStar?"#0d1f38":isFlor?"#2a1f0e":bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:"0.82rem",letterSpacing:"0.25em",color:gold,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:8}}>{name}</div>
                <div style={{fontSize:"0.58rem",color:isStar?"#4a5a7a":muted,fontStyle:"italic",flexShrink:0}}>
                  {isStar?"★ Stars":isFlor?"✿ Floral":style.id==="circles"?(name.length<=5?"1 circle":"2 circles"):style.label}
                </div>
              </div>

              {isGeo&&(
                <div>
                  <div style={{background:bg}}>
                    <svg viewBox={style.vb(name.length)} xmlns="http://www.w3.org/2000/svg" style={{width:"100%",display:"block"}}>
                      {style.base(ink,name.length)}
                      {name.split("").map((letter,i)=>{
                        const def=geom[letter];if(!def)return null;
                        const on=!!active[i];
                        return <g key={`${letter}-${i}`}>{def.el(on?red:ink,b=>on?b+1.4:b,tr)}</g>;
                      })}
                      <text x="200" y={parseInt(style.vb(name.length).split(" ")[3])-12} textAnchor="middle" fontFamily="Georgia,serif" fontSize="7" fontStyle="italic" fill={ink} letterSpacing="3.5" opacity="0.22">INKTRICK.COM</text>
                    </svg>
                  </div>
                  <div style={{padding:"12px 14px",borderTop:`1px solid ${bdr}`}}>
                    <div style={{fontSize:"0.54rem",letterSpacing:"0.3em",color:muted,textTransform:"uppercase",marginBottom:9,textAlign:"center"}}>Tap to reveal</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",marginBottom:9}}>
                      {name.split("").map((l,i)=>(
                        <button key={i} onClick={()=>toggle(i)} style={{background:active[i]?"rgba(176,48,24,0.18)":"rgba(255,255,255,0.04)",border:`1.5px solid ${active[i]?red:bdr}`,color:active[i]?"#d06040":muted,fontFamily:"Georgia,serif",fontWeight:active[i]?"800":"400",fontSize:"1rem",padding:"9px 3px",cursor:"pointer",borderRadius:3,minWidth:36,textAlign:"center",transition:"all 0.25s"}}>{l}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:7}}>
                      <button onClick={revealAll} style={{background:"none",border:`1px solid rgba(200,168,74,0.4)`,color:gold,fontFamily:"Georgia,serif",fontSize:"0.58rem",letterSpacing:"0.2em",textTransform:"uppercase",padding:"9px",cursor:"pointer",borderRadius:2,flex:1}}>◎ Reveal All</button>
                      <button onClick={hideAll} style={{background:"none",border:`1px solid ${bdr}`,color:muted,fontFamily:"Georgia,serif",fontSize:"0.58rem",letterSpacing:"0.2em",textTransform:"uppercase",padding:"9px",cursor:"pointer",borderRadius:2,flex:1}}>✕ Hide All</button>
                    </div>
                  </div>
                  {name.split("").some((_,i)=>active[i])&&(
                    <div style={{padding:"8px 16px",borderTop:`1px solid ${bdr}`,background:"rgba(176,48,24,0.05)"}}>
                      {name.split("").map((l,i)=>active[i]?(<div key={i} style={{color:"#d06040",fontSize:"0.68rem",lineHeight:1.8}}><b>{l}</b> — {geom[l]?.desc}</div>):null)}
                    </div>
                  )}
                </div>
              )}

              {isStar&&(
                <div>
                  <div style={{background:"#030c1a",position:"relative"}}>
                    <svg viewBox={`0 0 400 ${constellationH(name)}`} style={{width:"100%",display:"block"}}>
                      <ellipse cx="80" cy="80" rx="70" ry="45" fill="rgba(80,60,160,0.05)"/>
                      <ellipse cx="320" cy="50" rx="70" ry="45" fill="rgba(60,90,180,0.04)"/>
                      <circle cx="370" cy="22" r="14" fill="rgba(240,230,180,0.03)" stroke="rgba(240,220,160,0.08)" strokeWidth="0.8"/>
                      {BG_STARS.map(([x,y,r],i)=><circle key={i} cx={x} cy={y} r={r} fill={`rgba(180,200,240,${0.2+r*0.18})`}/>)}
                      {cLetters.map((letter,idx)=>{
                        const rev=cStep>=idx,act=cStep===idx;
                        return (
                          <g key={idx}>
                            {letter.lines.map(([a,b],li)=>(
                              <line key={li} x1={letter.stars[a][0]} y1={letter.stars[a][1]} x2={letter.stars[b][0]} y2={letter.stars[b][1]} stroke="rgba(160,195,255,0.5)" strokeWidth="0.9" strokeDasharray="4 3" opacity={rev?1:0} style={{transition:"opacity 0.5s"}}/>
                            ))}
                            {letter.stars.map(([sx,sy],si)=>(
                              <g key={si}>
                                <circle cx={sx} cy={sy} r={act?9:rev?5:2} fill={act?"rgba(200,220,255,0.14)":rev?"rgba(180,210,255,0.07)":"rgba(160,185,230,0.04)"} style={{transition:"all 0.5s"}}/>
                                <circle cx={sx} cy={sy} r={act?3:rev?2.2:1.3} fill={act?"#ffffff":rev?"#c8dcff":"rgba(160,185,230,0.45)"} style={{transition:"all 0.5s"}}/>
                                {act&&<><line x1={sx-6} y1={sy} x2={sx+6} y2={sy} stroke="rgba(220,235,255,0.5)" strokeWidth="0.7"/><line x1={sx} y1={sy-6} x2={sx} y2={sy+6} stroke="rgba(220,235,255,0.5)" strokeWidth="0.7"/></>}
                              </g>
                            ))}
                          </g>
                        );
                      })}
                      <text x="200" y={constellationH(name)-6} textAnchor="middle" fontFamily="Georgia,serif" fontSize="7" fontStyle="italic" fill="rgba(70,90,150,0.35)" letterSpacing="3">INKTRICK.COM</text>
                    </svg>
                    {cStep===-1&&!cAnim&&(
                      <div style={{position:"absolute",bottom:30,left:0,right:0,textAlign:"center",fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.8rem",color:"rgba(140,165,215,0.45)"}}>
                        A message is written in the stars…
                      </div>
                    )}
                  </div>
                  <div style={{padding:"11px 14px",borderTop:"1px solid #0d1f38",background:"#040e20",display:"flex",gap:7}}>
                    <button onClick={startCon} disabled={cAnim} style={{background:cDone?"rgba(176,48,24,0.1)":"rgba(160,195,255,0.05)",border:`1px solid ${cDone?"#b03018":"rgba(160,195,255,0.16)"}`,color:cDone?"#d06040":"#8aaad0",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.18em",textTransform:"uppercase",padding:"10px",cursor:cAnim?"not-allowed":"pointer",borderRadius:3,flex:2,transition:"all 0.3s"}}>
                      {cAnim?"✦ Revealing…":cDone?"✕ Reset":"✦ Reveal Letter by Letter"}
                    </button>
                    <button onClick={()=>setCStep(cLetters.length-1)} style={{background:"none",border:"1px solid #0d1f38",color:"#4a5a7a",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.15em",textTransform:"uppercase",padding:"10px",cursor:"pointer",borderRadius:3,flex:1}}>Show All</button>
                  </div>
                  {cDone&&(
                    <div style={{padding:"11px 14px",borderTop:"1px solid #0d1f38",background:"#020910",textAlign:"center"}}>
                      <div style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.9rem",color:"#90a8d0",letterSpacing:"0.1em"}}>✦ {name} ✦</div>
                      <div style={{fontSize:"0.62rem",color:"#3a4a6a",marginTop:3,fontStyle:"italic"}}>Hidden in the stars</div>
                    </div>
                  )}
                </div>
              )}

              {isFlor&&(
                <div>
                  <div style={{background:"#f7f0e4"}}>
                    <svg viewBox={`0 0 400 ${fWords.length<=2?385:435}`} style={{width:"100%",display:"block"}}>
                      {fWords.map((w,wi)=>{
                        const pos=fLayout[wi]||fLayout[0],color=FLORAL_COLORS[wi%3];
                        const leaves=floralLeaves(pos.cx,pos.cy,Math.max(w.length,4),pos.pl*1.3);
                        const svgH=fWords.length<=2?385:435;
                        return (
                          <g key={wi}>
                            <line x1={pos.cx} y1={pos.cy+pos.pl+8} x2={pos.cx} y2={svgH-10} stroke="rgba(50,90,30,0.3)" strokeWidth="1.4"/>
                            {leaves.map((d,li)=><path key={li} d={d} fill={color.leaf} stroke="rgba(30,60,20,0.2)" strokeWidth="0.5"/>)}
                          </g>
                        );
                      })}
                      {fPetals.map((p,i)=>{
                        const color=FLORAL_COLORS[p.wi%3],rev=fStep>=i,act=fStep===i;
                        return (
                          <g key={i}>
                            <path d={p.d} fill={rev?color.petal:"rgba(255,248,238,0.92)"} stroke={rev?color.stroke:"rgba(180,140,80,0.32)"} strokeWidth={act?1.8:rev?1.2:0.6} style={{transition:"fill 0.4s,stroke 0.4s"}}/>
                            <text x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="central" fontFamily="Georgia,serif" fontSize={act?"13":"11"} fontWeight="600" fill={rev?color.text:"transparent"} style={{transition:"fill 0.4s",userSelect:"none"}}>{p.letter}</text>
                          </g>
                        );
                      })}
                      {fWords.map((w,wi)=>{
                        const pos=fLayout[wi]||fLayout[0],color=FLORAL_COLORS[wi%3];
                        return (
                          <g key={wi}>
                            <circle cx={pos.cx} cy={pos.cy} r="13" fill={color.center} stroke="rgba(160,110,20,0.5)" strokeWidth="0.8"/>
                            {[0,1,2,3,4,5,6,7].map(di=>{const a=(di/8)*Math.PI*2;return <circle key={di} cx={pos.cx+Math.cos(a)*7.5} cy={pos.cy+Math.sin(a)*7.5} r="1.8" fill="rgba(170,90,15,0.6)"/>;})}
                            <circle cx={pos.cx} cy={pos.cy} r="4.5" fill="rgba(140,70,15,0.7)"/>
                          </g>
                        );
                      })}
                      <text x="200" y={fWords.length<=2?379:429} textAnchor="middle" fontFamily="Georgia,serif" fontSize="7" fontStyle="italic" fill="rgba(100,70,30,0.2)" letterSpacing="3">INKTRICK.COM</text>
                    </svg>
                    {fStep===-1&&!fAnim&&(
                      <div style={{textAlign:"center",padding:"5px 0 10px",fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.76rem",color:"rgba(120,80,30,0.4)"}}>
                        A message blooms in these petals…
                      </div>
                    )}
                  </div>
                  <div style={{padding:"11px 14px",borderTop:"1px solid #2a1f0e",background:"#100c04",display:"flex",gap:7}}>
                    <button onClick={startFlo} disabled={fAnim} style={{background:fDone?"rgba(192,24,106,0.1)":"rgba(192,24,106,0.05)",border:`1px solid ${fDone?"#c0186a":"rgba(192,24,106,0.2)"}`,color:fDone?"#c0186a":"#8a6040",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.18em",textTransform:"uppercase",padding:"10px",cursor:fAnim?"not-allowed":"pointer",borderRadius:3,flex:2,transition:"all 0.3s"}}>
                      {fAnim?"✿ Blooming…":fDone?"✕ Hide":"✿ Reveal Message"}
                    </button>
                    <button onClick={()=>setFStep(fTotal-1)} style={{background:"none",border:"1px solid #2a1f0e",color:"#5a4a2a",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.15em",textTransform:"uppercase",padding:"10px",cursor:"pointer",borderRadius:3,flex:1}}>Show All</button>
                  </div>
                  {fDone&&(
                    <div style={{padding:"11px 14px",borderTop:"1px solid #2a1f0e",background:"#0a0804",textAlign:"center"}}>
                      <div style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.9rem",color:"#c8a84a",letterSpacing:"0.1em"}}>✿ {name} ✿</div>
                      <div style={{fontSize:"0.6rem",color:"#3a2a10",marginTop:3,fontStyle:"italic"}}>Hidden in the garden, grown just for you</div>
                    </div>
                  )}
                </div>
              )}

              {isFw&&(
                <div style={{background:"#03010a"}}>
                  <svg viewBox="0 0 400 440" style={{width:"100%",display:"block"}}>
                    <rect x="0" y="0" width="400" height="440" fill="#03010a"/>
                    {FW_STARS.map((s,i)=><circle key={i} cx={s.x} cy={s.y} r={s.r} fill="rgba(210,200,255,0.3)"/>)}
                    <circle cx="350" cy="38" r="18" fill="rgba(255,245,200,0.05)" stroke="rgba(255,240,180,0.1)" strokeWidth="0.8"/>
                    <rect x="0" y="400" width="400" height="40" fill="#060312"/>
                    {[8,28,22,35,15,40,20,30,18,38,25,42,16,32,24,36].map((h,i)=>(
                      <rect key={i} x={i*26} y={400-h} width="22" height={h+40} fill="rgba(8,4,20,0.85)"/>
                    ))}
                    {fwWords.map((word,wi)=>{
                      const wy=FW_WORD_Y[wi]||FW_WORD_Y[FW_WORD_Y.length-1];
                      const color=FW_COLORS[wi%4];
                      const isNow=fwWordIdx===wi;
                      const isDone=fwShown.includes(wi);
                      if(!isNow&&!isDone) return <circle key={wi} cx={200} cy={wy} r="1.5" fill="rgba(180,160,255,0.1)"/>;
                      const visCount=isDone?word.length:(fwLetIdx+1);
                      const letters=word.split("").slice(0,visCount);
                      const lw=Math.min(32,(360)/word.length);
                      const startX=(400-word.length*lw)/2+lw/2;
                      const sparks=fwSparks(200,wy,24,18,55);
                      return(
                        <g key={wi}>
                          <circle cx={200} cy={wy} r={isNow?70:55} fill={color.glow} opacity={isNow?0.5:0.2} style={{transition:"all 0.4s"}}/>
                          {sparks.map((sp,si)=>(
                            <line key={si} x1={200} y1={wy} x2={sp.x} y2={sp.y} stroke={si%3===0?color.main:color.ray} strokeWidth={isNow?(si%2===0?1.5:0.8):0.6} opacity={isNow?0.85:0.35} strokeLinecap="round" style={{transition:"all 0.4s"}}/>
                          ))}
                          {sparks.filter((_,i)=>i%2===0).map((sp,si)=>(
                            <circle key={si} cx={sp.x} cy={sp.y} r={isNow?2.5:1.5} fill={color.main} opacity={isNow?1:0.5} style={{transition:"all 0.4s"}}/>
                          ))}
                          <circle cx={200} cy={wy} r={isNow?7:4} fill={color.main} style={{transition:"r 0.3s"}}/>
                          <circle cx={200} cy={wy} r="2.5" fill="white"/>
                          {letters.map((letter,li)=>{
                            const lx=startX+li*lw,isNew=isNow&&li===fwLetIdx;
                            return(
                              <g key={li}>
                                <text x={lx} y={wy+1} textAnchor="middle" dominantBaseline="central" fontFamily="Georgia,serif" fontSize="26" fontWeight="700" fill={color.main} opacity="0.2" style={{userSelect:"none"}}>{letter}</text>
                                <text x={lx} y={wy+1} textAnchor="middle" dominantBaseline="central" fontFamily="Georgia,serif" fontSize={isNew?"22":"20"} fontWeight="700" fill={isNew?"white":color.text} style={{transition:"fill 0.3s",userSelect:"none"}}>{letter}</text>
                              </g>
                            );
                          })}
                          {visCount>0&&<line x1={startX-lw*0.3} y1={wy+18} x2={startX+(visCount-0.7)*lw} y2={wy+18} stroke={color.main} strokeWidth="1.2" opacity={isNow?0.7:0.35} style={{transition:"all 0.3s"}}/>}
                        </g>
                      );
                    })}
                    <text x="200" y="433" textAnchor="middle" fontFamily="Georgia,serif" fontSize="7" fontStyle="italic" fill="rgba(80,60,120,0.25)" letterSpacing="3">INKTRICK.COM</text>
                  </svg>
                  {fwWordIdx===-1&&!fwAnim&&fwShown.length===0&&(
                    <div style={{textAlign:"center",padding:"8px 0 12px",fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.78rem",color:"rgba(120,100,200,0.35)"}}>
                      A message waits in the night sky…
                    </div>
                  )}
                  <div style={{padding:"11px 14px",borderTop:"1px solid #140c28",background:"#080418",display:"flex",gap:7}}>
                    <button onClick={startFw} disabled={fwAnim} style={{background:fwDone?"rgba(180,30,50,0.15)":"rgba(180,30,50,0.06)",border:`1px solid ${fwDone?"#c03040":"rgba(180,30,50,0.2)"}`,color:fwDone?"#f06070":"#601828",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.18em",textTransform:"uppercase",padding:"10px",cursor:fwAnim?"not-allowed":"pointer",borderRadius:3,flex:2,transition:"all 0.3s"}}>
                      {fwAnim?"🎆 Bursting…":fwDone?"✕ Hide":"🎆 Launch Fireworks"}
                    </button>
                    <button onClick={()=>{setFwShown(Array.from({length:fwTotal},(_,i)=>i));setFwWordIdx(-1);setFwLetIdx(-1);setFwAnim(false);clearTimeout(fwTimer.current);}} style={{background:"none",border:"1px solid #140c28",color:"#1a1030",fontFamily:"Georgia,serif",fontSize:"0.62rem",letterSpacing:"0.15em",textTransform:"uppercase",padding:"10px",cursor:"pointer",borderRadius:3,flex:1}}>Show All</button>
                  </div>
                  {fwDone&&(
                    <div style={{padding:"11px 14px",borderTop:"1px solid #140c28",background:"#020108",textAlign:"center"}}>
                      <div style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:"0.9rem",color:"#c8a84a",letterSpacing:"0.12em"}}>🎆 {name} 🎆</div>
                      <div style={{fontSize:"0.6rem",color:"#140c28",marginTop:3,fontStyle:"italic"}}>Written in light across the sky, just for you</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {!name&&(
            <div style={{textAlign:"center",color:muted,fontStyle:"italic",fontSize:"0.8rem",marginTop:8}}>
              Type any name and tap Generate ✦
            </div>
          )}

          <div style={{marginTop:18,textAlign:"center",fontStyle:"italic",fontSize:"0.65rem",color:"#3a3020"}}>
            inktrick.com · the secret is in the lines
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InkTrickStudio/>);
  </script>
</body>
</html>
